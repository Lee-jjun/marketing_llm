{% extends 'dashboard/base.html' %}
    {% block title %}리뷰 목록{% endblock %}
        {% block content %}
            <h2>리뷰 목록</h2>
                <table class="default-table">
                    <tr>
                        <th>ID</th>
                        <th>작성자</th>
                        <th>내용</th>
                        <th>생성일</th>
                        </tr>
            {% for r in reviews %}
                        <tr>
                        <td>{{ r.id }}</td>
                        <td>{{ r.author }}</td>
                        <td>{{ r.content }}</td>
                        <td>{{ r.created_at }}</td>
                    </tr>
        {% endfor %}
            </table>
{% endblock %}
