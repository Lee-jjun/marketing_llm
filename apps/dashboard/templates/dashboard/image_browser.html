{% extends 'dashboard/base.html' %}
{% block title %}이미지 탐색{% endblock %}
{% block header_title %}이미지 탐색{% endblock %}
{% block content %}
<div class="card">
  <h4>이미지 썸네일</h4>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px">
    {% for img in images %}
      <div style="background:#fff;padding:10px;border-radius:8px;border:1px solid var(--border);">
        <img src="{{ img.file }}" style="width:100%;height:120px;object-fit:cover;border-radius:6px">
        <div class="meta" style="margin-top:8px">{{ img.caption|default:"" }}</div>
      </div>
    {% empty %}
      <div class="row-muted">이미지가 없습니다.</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
